<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, getDocs, deleteDoc, doc, where, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBFzPc8WF4IGN74RZ1axtpUBu6Bv8Iu-UQ",
        authDomain: "abysz-esports.firebaseapp.com",
        projectId: "abysz-esports",
        storageBucket: "abysz-esports.firebasestorage.app",
        messagingSenderId: "200968659347",
        appId: "1:200968659347:web:3a13d1614d00ed29968866"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const ADMIN_EMAIL = "abyszofficial@gmail.com";

    const accessDeniedSec = document.getElementById('access-denied');
    const dashboardContentSec = document.getElementById('dashboard-content');
    const playersRows = document.getElementById('db-players-rows');
    const countMain = document.getElementById('count-main');
    const countAcademy = document.getElementById('count-academy');
    const countCdf = document.getElementById('count-cdf');
    
    const siteVisitesNum = document.getElementById('site-visites');
    const discordClicksNum = document.getElementById('discord-clicks');
    const boutiqueInterestNum = document.getElementById('boutique-interest');
    const conversionRateNum = document.getElementById('conversion-rate');
    const topPlayerClickStr = document.getElementById('top-player-click');
    const pageFilter = document.getElementById('page-filter');
    const resetBtn = document.getElementById('reset-analytics-btn');

    const searchPlayerEmail = document.getElementById('search-player-email');
    const btnSearchPlayer = document.getElementById('btn-search-player');
    const searchError = document.getElementById('search-error');
    const playerEditFormContainer = document.getElementById('player-edit-form-container');
    const dashboardPlayerModifyForm = document.getElementById('dashboard-player-modify-form');
    const saveSuccess = document.getElementById('save-success');
    const fileInputPc = document.getElementById('player-file-pc');
    const progressZone = document.getElementById('upload-progress-zone');
    const progressBar = document.getElementById('upload-progress-bar');

    let myChart = null; let pieChart = null; let listeDocsAnalytics = [];
    let activeTargetUid = ""; let activeTargetEmail = "";

    onAuthStateChanged(auth, (user) => {
        if (user && user.email === ADMIN_EMAIL) {
            accessDeniedSec.classList.add('hidden');
            dashboardContentSec.classList.remove('hidden');
            chargerDonneesDashboard();
            initialiserGraphiques();
            ecouterCollectionAnalytics();
            pageFilter.addEventListener('change', () => calculerEtAfficherStats(pageFilter.value));
            setupResetButton();
            setupPlayerEditing(); 
        } else {
            accessDeniedSec.classList.remove('hidden');
            dashboardContentSec.classList.add('hidden');
        }
    });

    function setupResetButton() {
        resetBtn.onclick = async () => {
            if (confirm("Réinitialiser les statistiques de visites ?")) {
                try {
                    const snap = await getDocs(collection(db, "analytics"));
                    snap.forEach((d) => deleteDoc(doc(db, "analytics", d.id)));
                    alert("Statistiques remises à zéro !");
                } catch (e) { alert(e.message); }
            }
        };
    }

    function ecouterCollectionAnalytics() {
        onSnapshot(collection(db, "analytics"), (snapshot) => {
            listeDocsAnalytics = [];
            snapshot.forEach((d) => listeDocsAnalytics.push(d.data()));
            calculerEtAfficherStats(pageFilter.value);
        });
    }

    function calculerEtAfficherStats(filtrePage) {
        let totalVisites = 0; let totalDiscord = 0; let totalBoutique = 0;
        let clicsJoueurs = {}; let pagesDist = { index: 0, roster: 0, boutique: 0 };

        listeDocsAnalytics.forEach((docData) => {
            const pageDuDoc = docData.page || "";
            if (pageDuDoc.includes("index")) pagesDist.index++;
            else if (pageDuDoc.includes("roster")) pagesDist.roster++;
            else if (pageDuDoc.includes("boutique")) pagesDist.boutique++;

            let estDiscord = docData.isDiscordClick === true || docData.clickType === "discord";
            if (estDiscord) { totalDiscord++; return; }
            if (pageDuDoc.includes("boutique")) totalBoutique++;
            if (filtrePage !== "all" && pageDuDoc !== filtrePage) return;
            totalVisites++;

            const nomJoueur = docData.clickedPlayer || docData.playerName || docData.pseudo;
            if (nomJoueur) clicsJoueurs[nomJoueur] = (clicsJoueurs[nomJoueur] || 0) + 1;
        });

        siteVisitesNum.textContent = totalVisites;
        discordClicksNum.textContent = totalDiscord;
        boutiqueInterestNum.textContent = totalBoutique;
        conversionRateNum.textContent = totalVisites > 0 ? `${((totalDiscord / totalVisites) * 100).toFixed(1)}%` : "0%";
    }

    function initialiserGraphiques() {
        // Code d'initialisation des graphiques existant si tu as Chart.js configuré
    }

    function chargerDonneesDashboard() {
        const q = query(collection(db, "roster"), orderBy("createdAt", "asc"));
        onSnapshot(q, (snapshot) => {
            playersRows.innerHTML = "";
            let mCount = 0, aCount = 0, cCount = 0;
            snapshot.forEach((docSnap) => {
                const player = docSnap.data();
                if (player.team === "main") mCount++; else if (player.team === "academy") aCount++; else if (player.team === "cdf") cCount++;
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${player.pseudo}</td><td>${player.team}</td><td>${player.role}</td><td>${player.earnings}</td><td>-</td><td><button class="action-btn">Modifier</button></td>`;
                playersRows.appendChild(tr);
            });
            countMain.textContent = mCount; countAcademy.textContent = aCount; countCdf.textContent = cCount;
        });
    }

    function setupPlayerEditing() {
        btnSearchPlayer.onclick = async () => {
            searchError.classList.add('hidden');
            playerEditFormContainer.classList.add('hidden');
            if (saveSuccess) saveSuccess.classList.add('hidden');
            if (fileInputPc) fileInputPc.value = "";
            if (progressZone) progressZone.style.display = "none";

            const emailRecherche = searchPlayerEmail.value.trim().toLowerCase();
            if (!emailRecherche) return;

            try {
                const q = query(collection(db, "players"), where("email", "==", emailRecherche));
                const snapshot = await getDocs(q);

                if (!snapshot.empty) {
                    const targetDoc = snapshot.docs[0];
                    activeTargetUid = targetDoc.id; 
                    activeTargetEmail = emailRecherche;

                    const data = targetDoc.data();
                    document.getElementById('player-pseudo-input').value = data.pseudo || "";
                    document.getElementById('player-roster-input').value = data.roster || "";
                    document.getElementById('player-role-input').value = data.role || "";
                    document.getElementById('player-rank-input').value = data.rank || "";
                    document.getElementById('player-date-input').value = data.joinDate || "";
                    document.getElementById('player-doc-input').value = data.documentUrl || "";
                    document.getElementById('player-msg-input').value = data.staffMessage || "";

                    playerEditFormContainer.classList.remove('hidden');
                } else {
                    searchError.textContent = "Aucun joueur trouvé. Demandez-lui de se connecter une fois à son espace.";
                    searchError.classList.remove('hidden');
                }
            } catch (err) { console.error(err); }
        };

        dashboardPlayerModifyForm.onsubmit = async () => {
            if (saveSuccess) saveSuccess.classList.add('hidden');
            if (!activeTargetUid) return;

            const btnSave = document.getElementById('btn-save-player');
            btnSave.disabled = true;
            btnSave.textContent = "Enregistrement...";

            let finalDocUrl = document.getElementById('player-doc-input').value.trim();
            const selectedFile = fileInputPc ? fileInputPc.files[0] : null;

            try {
                // Si un fichier PC est sélectionné, on utilise l'hébergeur alternatif Catbox
                if (selectedFile) {
                    if (progressZone) progressZone.style.display = "block";
                    if (progressBar) progressBar.style.width = "40%";

                    const formData = new FormData();
                    formData.append("fileToUpload", selectedFile);
                    formData.append("reqtype", "fileupload");

                    const response = await fetch("https://catbox.moe/user/api.php", {
                        method: "POST",
                        body: formData
                    });

                    if (response.ok) {
                        finalDocUrl = await response.text(); 
                        if (progressBar) progressBar.style.width = "100%";
                    } else {
                        throw new Error("Échec du téléversement sur l'hébergeur alternatif.");
                    }
                }

                // SAUVEGARDE DIRECTE DANS FIRESTORE (FONCTIONNE À 100%)
                const dataMiseAJour = {
                    email: activeTargetEmail,
                    pseudo: document.getElementById('player-pseudo-input').value.trim(),
                    roster: document.getElementById('player-roster-input').value.trim(),
                    role: document.getElementById('player-role-input').value.trim(),
                    rank: document.getElementById('player-rank-input').value.trim(),
                    joinDate: document.getElementById('player-date-input').value.trim(),
                    documentUrl: finalDocUrl, 
                    staffMessage: document.getElementById('player-msg-input').value.trim()
                };

                const docPlayerRef = doc(db, "players", activeTargetUid);
                await setDoc(docPlayerRef, dataMiseAJour, { merge: true });
                
                document.getElementById('player-doc-input').value = finalDocUrl;
                if (saveSuccess) saveSuccess.classList.remove('hidden');
                if (fileInputPc) fileInputPc.value = ""; 
                if (progressZone) setTimeout(() => { progressZone.style.display = "none"; }, 1500);
            } catch (error) {
                alert("Erreur de sauvegarde : " + error.message);
            } finally {
                btnSave.disabled = false;
                btnSave.textContent = "Enregistrer les modifications";
            }
        };
    }
</script>
