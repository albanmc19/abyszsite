<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABYSZ | Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .dashboard-container { max-width: 1200px; margin: 120px auto 40px auto; padding: 0 20px; }
        .dash-header { display: flex; justify-content: space-between; align-items: center; background: #141414; padding: 20px 30px; border-radius: 16px; border: 1px solid #2a2a2a; margin-bottom: 25px; }
        .dash-header h1 { font-family: 'Orbitron'; color: white; margin: 0; font-size: 1.8rem; }
        .dash-tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 1px solid #2a2a2a; padding-bottom: 10px; }
        .tab-btn { background: #141414; border: 1px solid #2a2a2a; color: #aaa; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; }
        .tab-btn.active { background: #a855f7; color: white; border-color: #a855f7; box-shadow: 0 0 15px rgba(168, 85, 247, 0.3); }
        .dash-panel { display: none; }
        .dash-panel.active { display: block; }
        .dash-grid { display: grid; grid-template-columns: 1fr; gap: 30px; }
        .dash-card { background: #141414; border: 1px solid #2a2a2a; border-radius: 16px; padding: 30px; }
        .dash-card h2 { font-family: 'Orbitron'; color: #a855f7; margin-top: 0; margin-bottom: 25px; border-bottom: 1px solid #2a2a2a; padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 6px; color: #aaa; font-size: 0.85rem; font-family: 'Orbitron'; }
        .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 12px; background: #0a0a0a; border: 1px solid #2a2a2a; color: white; border-radius: 8px; box-sizing: border-box; }
        .form-btn { background: #a855f7; color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; font-family: 'Orbitron'; }
        .logout-btn { background: #ff4444; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; }
        .stats-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-box { background: #0a0a0a; border: 1px solid #2a2a2a; padding: 20px; border-radius: 12px; text-align: center; }
        .stat-box .num { font-size: 1.8rem; font-family: 'Orbitron'; color: #a855f7; font-weight: 700; }
        .stat-box .label { font-size: 0.85rem; color: #666; margin-top: 5px; }
        .chart-container { position: relative; width: 100%; height: 400px; background: #0a0a0a; padding: 15px; border-radius: 12px; border: 1px solid #2a2a2a; box-sizing: border-box; }
        .guard-screen { position: fixed; inset: 0; background: #0a0a0a; z-index: 99999; display: flex; justify-content: center; align-items: center; color: white; font-family: 'Orbitron'; }
        .hidden { display: none !important; }
        .filter-zone { margin-bottom: 15px; display: flex; justify-content: flex-end; }
        .filter-zone select { background: #0a0a0a; border: 1px solid #2a2a2a; color: white; padding: 8px 16px; border-radius: 6px; font-family: 'Orbitron'; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div id="guard-screen" class="guard-screen"><p>VÉRIFICATION DE L'ACCÈS DE L'ABYSZ CRU...</p></div>

    <nav>
        <div class="logo"><a href="index.html" style="display:flex; align-items:center; gap:10px; text-decoration:none; color:inherit;"><img src="logo.png" alt="Logo ABYSZ"> ABYSZ DASHBOARD</a></div>
        <ul><li><a href="index.html">Voir le Site</a></li><li><a href="roster.html">Roster</a></li></ul>
    </nav>

    <div class="dashboard-container">
        <div class="dash-header">
            <div><h1>Espace Administrateur</h1><span id="user-display-email" style="color: #666; font-size: 0.9rem;"></span></div>
            <button id="logout-btn" class="logout-btn">Déconnexion</button>
        </div>

        <div class="dash-tabs">
            <button class="tab-btn active" onclick="switchTab('tab-stats')">📈 Analytics Pro</button>
            <button class="tab-btn" onclick="switchTab('tab-annonces')">📢 Actualités</button>
            <button class="tab-btn" onclick="switchTab('tab-roster')">👤 Roster</button>
        </div>

        <div id="tab-stats" class="dash-panel active">
            <div class="dash-grid">
                <div class="dash-card">
                    <h2>📊 Tableau de Bord des Données Récoltées</h2>
                    
                    <div class="stats-summary">
                        <div class="stat-box"><div class="num" id="stat-total-visites">-</div><div class="label">Visites Totales (Brut)</div></div>
                        <div class="stat-box"><div class="num" id="stat-discord-clicks">-</div><div class="label">Rejections vers Discord</div></div>
                        <div class="stat-box"><div class="num" id="stat-top-joueur" style="font-size:1.3rem; padding-top:8px;">-</div><div class="label">Joueur le plus cliqué</div></div>
                    </div>

                    <div class="filter-zone">
                        <select id="page-filter-select">
                            <option value="all">Toutes les Pages</option>
                            <option value="index.html">Page Accueil (index.html)</option>
                            <option value="roster.html">Page Équipe (roster.html)</option>
                        </select>
                    </div>

                    <div class="chart-container">
                        <canvas id="analyticsChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-annonces" class="dash-panel">
            <div class="dash-card">
                <h2>📢 Publier une actualité</h2>
                <form id="announcement-form" onsubmit="return false;">
                    <div class="input-group"><label for="annonce-title">Titre</label><input type="text" id="annonce-title" required></div>
                    <div class="input-group"><label for="annonce-content">Message</label><textarea id="annonce-content" rows="5" required></textarea></div>
                    <button type="submit" class="form-btn">Publier</button>
                </form>
            </div>
        </div>

        <div id="tab-roster" class="dash-panel">
            <div class="dash-card">
                <h2>👤 Ajouter un joueur au Roster</h2>
                <form id="player-form" onsubmit="return false;">
                    <div class="input-group"><label for="player-team">Catégorie</label><select id="player-team"><option value="main">Équipe Principale</option><option value="academy">Académie</option><option value="cdf">CDF</option></select></div>
                    <div class="input-group"><label for="player-pseudo">Pseudo</label><input type="text" id="player-pseudo" required></div>
                    <div class="input-group"><label for="player-role">Rôle</label><input type="text" id="player-role" required></div>
                    <button type="submit" class="form-btn">Enregistrer</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.dash-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBFzPc8WF4IGN74RZ1axtpUBu6Bv8Iu-UQ", authDomain: "abysz-esports.firebaseapp.com", projectId: "abysz-esports", storageBucket: "abysz-esports.firebasestorage.app", messagingSenderId: "200968659347", appId: "1:200968659347:web:3a13d1614d00ed29968866" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        let chartInstance = null;
        let globalAnalyticsData = [];

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "login.html";
            else { document.getElementById('user-display-email').textContent = `Connecté : ${user.email}`; document.getElementById('guard-screen').classList.add('hidden'); chargerDonnees(); }
        });

        document.getElementById('logout-btn').onclick = () => { signOut(auth).then(() => window.location.href = "login.html" ); };

        async function chargerDonnees() {
            try {
                // 1. Récupération des données de visites
                const snapshotVisites = await getDocs(collection(db, "analytics"));
                globalAnalyticsData = [];
                snapshotVisites.forEach(doc => globalAnalyticsData.push(doc.data()));

                // 2. Récupération des clics Discord & Joueurs
                const snapshotEvents = await getDocs(collection(db, "events"));
                let totalDiscord = 0;
                let clicsJoueurs = {};

                snapshotEvents.forEach(doc => {
                    const ev = doc.data();
                    if(ev.type === "click_discord") totalDiscord++;
                    if(ev.type === "click_joueur" && ev.joueur) {
                        clicsJoueurs[ev.joueur] = (clicsJoueurs[ev.joueur] || 0) + 1;
                    }
                });

                document.getElementById('stat-discord-clicks').textContent = totalDiscord;

                // Trouver le joueur le plus cliqué
                let topJoueurName = "Aucun clic"; let maxClics = 0;
                for (const [name, count] of Object.entries(clicsJoueurs)) {
                    if(count > maxClics) { maxClics = count; topJoueurName = `${name} (${count} 👀)`; }
                }
                document.getElementById('stat-top-joueur').textContent = topJoueurName;

                // Générer le graphique initial
                genererGraphique("all");

            } catch (e) { console.error(e); }
        }

        // Déclencheur du filtre par page
        document.getElementById('page-filter-select').addEventListener('change', (e) => {
            genererGraphique(e.target.value);
        });

        function genererGraphique(pageFiltre) {
            const dataFiltree = globalAnalyticsData.filter(item => pageFiltre === "all" || item.page === pageFiltre);
            document.getElementById('stat-total-visites').textContent = dataFiltree.length;

            // Compresser par jour et par support
            const ordinateursParJour = {}; const mobilesParJour = {};
            const ensembleDates = new Set();

            dataFiltree.forEach(item => {
                const jour = item.date; if(!jour) return;
                ensembleDates.add(jour);
                if (item.device === "Ordinateur") ordinateursParJour[jour] = (ordinateursParJour[jour] || 0) + 1;
                else mobilesParJour[jour] = (mobilesParJour[jour] || 0) + 1;
            });

            const labelsTries = Array.from(ensembleDates).sort();
            const datasetPC = labelsTries.map(d => ordinateursParJour[d] || 0);
            const datasetMobile = labelsTries.map(d => mobilesParJour[d] || 0);

            const ctx = document.getElementById('analyticsChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labelsTries,
                    datasets: [
                        { label: 'Ordinateur (PC)', data: datasetPC, borderColor: '#a855f7', backgroundColor: 'transparent', borderWidth: 3, tension: 0.2 },
                        { label: 'Mobile / Smartphone', data: datasetMobile, borderColor: '#3b82f6', backgroundColor: 'transparent', borderWidth: 3, tension: 0.2 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#ffffff' } } },
                    scales: {
                        x: { grid: { color: '#2a2a2a' }, ticks: { color: '#aaa' } },
                        y: { grid: { color: '#2a2a2a' }, ticks: { color: '#aaa', beginAtZero: true, stepSize: 1 } }
                    }
                }
            });
        }
    </script>
</body>
</html>
