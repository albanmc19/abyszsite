<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abysz Esports</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .logo-link {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: inherit;
        }

        /* ── BARRE DE RÉSEAUX SOCIAUX ── */
        .social-links {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 8px;
            padding-left: 12px;
            border-left: 1px solid rgba(255, 255, 255, 0.2);
        }
        .social-links a {
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.6);
            transition: color 0.2s ease, transform 0.2s ease;
            text-decoration: none;
        }
        .social-links a:hover {
            color: #ffffff;
            transform: translateY(-2px);
        }

        /* ── SECTION ANNONCES ── */
        .announcements-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
        }
        .announcements-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        .admin-gate-btn {
            background: transparent;
            border: 1px solid #a855f7;
            color: #a855f7;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .admin-gate-btn:hover {
            background: #a855f7;
            color: white;
            box-shadow: 0 0 15px #a855f7;
        }
        .announcements-feed {
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: left;
        }
        .announcement-card {
            background: #1a1a1a;
            border-left: 4px solid #a855f7;
            padding: 25px;
            border-radius: 0 16px 16px 0;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .announcement-card h3 {
            font-family: 'Orbitron', sans-serif;
            color: #ffffff;
            margin-bottom: 10px;
            font-size: 1.4rem;
        }
        .announcement-card p {
            color: #ccc;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 15px;
            white-space: pre-wrap;
        }
        .announcement-date {
            font-size: 0.8rem;
            color: #777;
        }
        .delete-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ff4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        .delete-btn:hover {
            background: #cc3333;
        }
        .loading-text { color: #666; font-style: italic; text-align: center; }
    </style>
</head>
<body>

        <div class="logo">
            <a href="index.html" class="logo-link">
                <img src="logo.png" alt="Logo ABYSZ">
                ABYSZ
            </a>

                <a href="https://www.tiktok.com/@abysz_o" target="_blank" aria-label="TikTok ABYSZ">
