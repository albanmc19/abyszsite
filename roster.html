<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABYSZ | Roster 2026</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        .logo-link { display:flex; align-items:center; gap:10px; text-decoration:none; color:inherit; }
        .roster-header-container { display:flex; justify-content:space-between; align-items:center; max-width:1200px; margin:0 auto 30px auto; padding:0 20px; }
        .admin-gate-btn { background:transparent; border:1px solid #a855f7; color:#a855f7; padding:8px 16px; border-radius:20px; cursor:pointer; font-family:'Orbitron',sans-serif; transition:all 0.3s ease; text-decoration: none; display: inline-block; }
        .admin-gate-btn:hover { background:#a855f7; color:white; box-shadow:0 0 15px #a855f7; }
        .loading-text { text-align:center; color:#666; font-style:italic; grid-column:1/-1; padding:20px; }
        .player-avatar-img { width:100%; height:200px; object-fit:cover; border-bottom:2px solid #a855f7; background:#141414; }
        .popup-avatar-img { width:100%; max-height:250px; object-fit:contain; border:2px solid #a855f7; border-radius:12px; margin:0 auto 20px auto; display:block; background:#0a0a0a; }
        .modal-overlay { display:none !important; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; justify-content:center; align-items:center; padding:20px; }
        .modal-overlay.active { display:flex !important; }
        .hidden { display:none !important; }
        .player-card-container { position:relative; }
        .admin-controls { position:absolute; top:10px; right:10px; display:flex; gap:6px; z-index:10; }
        .inline-edit-btn { background:#a855f7; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:0.75rem; font-weight:bold; }
        .inline-delete-btn { background:#ff4444; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:0.75rem; font-weight:bold; }
        .pr-history-section { background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 12px; padding: 16px; margin: 16px 0; }
        .pr-history-title { font-family: 'Orbitron'; color: #a855f7; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 12px; }
        .pr-evolution-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 20px; font-family: 'Orbitron'; font-size: 0.85rem; font-weight: 700; margin-bottom: 14px; }
        .pr-evolution-badge.positive { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
        .pr-evolution-badge.negative { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
        .pr-evolution-badge.neutral  { background: rgba(168,85,247,0.1); color: #a855f7; border: 1px solid rgba(168,85,247,0.3); }
        .pr-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        .pr-table th { color: #666; padding: 4px 8px; text-align: left; }
        .pr-table td { padding: 6px 8px; color: #ccc; border-bottom: 1px solid #1a1a1a; }
        .pr-delta-cell.pos { color: #22c55e; font-weight:700; }
        .pr-delta-cell.neg { color: #ef4444; font-weight:700; }
    </style>
</head>
<body>
    <nav>
        <div class="logo"><a href="index.html" class="logo-link"><img src="logo.png" alt="Logo ABYSZ"> ABYSZ</a></div>
        <ul><li><a href="index.html">Accueil</a></li><li><a href="roster.html">Roster</a></li><li><a href="boutique.html">Boutique</a></li></ul>
    </nav>

    <section style="padding-top: 160px;">
        <div class="roster-header-container"><h2>Notre Roster 2026</h2><a href="login.html" class="admin-gate-btn">🔑 Équipe Admin</a></div>
        <div class="roster-grid" id="main-roster-grid"><p class="loading-text">Chargement...</p></div>
        <h2 style="margin-top:80px;">Joueurs Académiques</h2>
        <div class="roster-grid" id="academy-roster-grid"></div>
        <h2 style="margin-top:80px;">Centre de Formation (CDF)</h2>
        <div class="roster-grid" id="cdf-roster-grid"></div>
    </section>

    <div id="popups-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, deleteDoc, doc, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBFzPc8WF4IGN74RZ1axtpUBu6Bv8Iu-UQ", authDomain: "abysz-esports.firebaseapp.com", projectId: "abysz-esports", storageBucket: "abysz-esports.firebasestorage.app", messagingSenderId: "200968659347", appId: "1:200968659347:web:3a13d1614d00ed29968866" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        const mainGrid = document.getElementById('main-roster-grid');
        const cdfGrid = document.getElementById('cdf-roster-grid');
        const academyGrid = document.getElementById('academy-roster-grid');
        const popupsContainer = document.getElementById('popups-container');
        let currentUser = null;

        function calculerEvolution(h) { if(!h || h.length<2) return null; const d=h[h.length-1].value, a=h[h.length-2].value; return a===0?null:{pct:((d-a)/a*100).toFixed(1)}; }

        onSnapshot(query(collection(db, "roster"), orderBy("createdAt", "asc")), (snapshot) => {
            mainGrid.innerHTML = ""; cdfGrid.innerHTML = ""; academyGrid.innerHTML = ""; popupsContainer.innerHTML = "";
            snapshot.forEach((docSnap) => {
                const p = docSnap.data(); const id = docSnap.id; const imgSrc = p.image && p.image!=="#" ? p.image : "logo.png";
                const card = document.createElement('div'); card.className = "player-card-container";
                card.innerHTML = `<div class="admin-controls ${currentUser?'':'hidden'}"><a class="inline-edit-btn" href="dashboard.html?edit=${id}">✏️</a><button class="inline-delete-btn" data-id="${id}">X</button></div>
                    <div class="player-card" id="card-${id}"><img src="${imgSrc}" class="player-avatar-img"><div class="player-info"><div class="player-pseudo">${p.pseudo}</div><div class="player-role">${p.role}</div><span class="voir-profil">Voir le profil</span></div></div>`;
                
                if (p.team === "main") mainGrid.appendChild(card);
                else if (p.team === "academy") academyGrid.appendChild(card);
                else if (p.team === "cdf") cdfGrid.appendChild(card);

                const modal = document.createElement('div'); modal.id = `popup-${id}`; modal.className = "modal-overlay";
                modal.innerHTML = `<div class="modal-content" style="max-width:500px;"><span class="modal-close" id="close-${id}">&times;</span><img src="${imgSrc}" class="popup-avatar-img"><h3>${p.pseudo}</h3><p style="text-align:center;color:#a855f7;">${p.role}</p><p>${p.bio || ''}</p></div>`;
                popupsContainer.appendChild(modal);

                document.getElementById(`card-${id}`).onclick = () => {
                    document.getElementById(`popup-${id}`).classList.add('active');
                    // Idée 2 : Track de l'engagement joueur
                    addDoc(collection(db, "events"), { type: "click_joueur", joueur: p.pseudo, timestamp: new Date() });
                };
                document.getElementById(`close-${id}`).onclick = (e) => { e.stopPropagation(); document.getElementById(`popup-${id}`).classList.remove('active'); };
            });
        });

        onAuthStateChanged(auth, (user) => { currentUser = user; });

        // ── 📊 ANALYTICS ADVANCED (Idée 1) ──
        async function enregistrerVisite() {
            const support = window.innerWidth < 768 ? "Mobile" : "Ordinateur";
            try { await addDoc(collection(db, "analytics"), { date: new Date().toISOString().split('T')[0], page: "roster.html", device: support, timestamp: new Date() }); } catch (e) {}
        }
        enregistrerVisite();
    </script>
</body>
</html>
